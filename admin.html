<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS - Gold Management</title>
<style>
:root {
    --bg: #09090d;
    --card: #111118;
    --border: rgba(212, 175, 55, 0.12);
    --primary: #d4af37;
    --secondary: #f3e5ab;
    --gold-glow: rgba(212, 175, 55, 0.35);
    --text: #ffffff;
    --muted: #9fa0a6;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue: #3498db;
    --orange: #ff9f43;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('https://i.postimg.cc/gky5YNH2/1778823817951-3.jpg') center/cover no-repeat;
    opacity: .02;
    z-index: -2;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(5,5,8,0.85), rgba(5,5,8,0.98));
    z-index: -1;
}

.container { max-width: 1300px; margin: 0 auto; }

.admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}

.admin-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
.admin-header h1 span { 
    background: linear-gradient(135deg, #ffe066, #d4af37, #aa7c11);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn-back {
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--border);
    color: var(--primary);
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
}
.btn-back:hover { color: white; border-color: var(--primary); box-shadow: 0 0 12px var(--gold-glow); }

.admin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
}

@media (max-width: 968px) {
    .admin-grid { grid-template-columns: 1fr; }
}

.panel-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    transition: border-color 0.3s;
}
.panel-box:hover { border-color: rgba(212, 175, 55, 0.25); }

.panel-box h3 {
    font-size: 1.2rem;
    font-weight: 800;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(212, 175, 55, 0.15);
    background: rgba(0,0,0,.5);
    color: white;
    outline: none;
    transition: 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 8px var(--gold-glow);
}
.form-group textarea { resize: none; height: 70px; }

.btn-submit {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-weight: 800;
    font-size: 0.95rem;
    background: linear-gradient(135deg, #f3e5ab, #d4af37, #aa7c11);
    color: #111;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); filter: brightness(1.1); }

.team-list { display: flex; flex-direction: column; gap: 12px; max-height: 280px; overflow-y: auto; }
.team-member {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: rgba(212,175,55,0.02);
    border: 1px solid rgba(212,175,55,0.06);
    border-radius: 16px;
}
.member-info h4 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.member-info p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.btn-remove {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.2);
    color: #e74c3c;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.7rem;
}

.task-board { display: flex; flex-direction: column; gap: 12px; max-height: 480px; overflow-y: auto; }
.task-card {
    background: rgba(0,0,0,0.4);
    border-left: 4px solid var(--primary);
    padding: 16px;
    border-radius: 0 16px 16px 0;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
}
.task-card.high { border-left-color: var(--red); }
.task-card.review { border-left-color: var(--orange); background: rgba(255,159,67,0.05); }
.task-card.done { border-left-color: #333; opacity: 0.4; }

.task-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.task-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; color: #fff; }
.task-desc { font-size: 0.85rem; color: #b9bbbe; line-height: 1.4; margin-bottom: 10px; }
.task-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.task-user { font-size: 0.8rem; background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.1); padding: 4px 10px; border-radius: 999px; font-weight: 600; color: var(--secondary); }

.badge-status {
    font-size: 0.75rem;
    font-weight: 800;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 5px 10px;
    border-radius: 8px;
}
.badge-status:hover { background: rgba(212,175,55,0.1); border-color: var(--primary); color: #fff !important; }

.badge-approve {
    background: rgba(46,204,113,0.1);
    border-color: rgba(46,204,113,0.3);
    color: #2ecc71;
    margin-left: 8px;
}
.badge-approve:hover { background: rgba(46,204,113,0.2); color: #2ecc71 !important; }

.badge-reject {
    background: rgba(231,76,60,0.1);
    border-color: rgba(231,76,60,0.3);
    color: #e74c3c;
    margin-left: 8px;
}
.badge-reject:hover { background: rgba(231,76,60,0.2); color: #e74c3c !important; }

.notification-bell {
    position: relative;
    cursor: pointer;
    font-size: 1.3rem;
}
.notification-badge {
    position: absolute;
    top: -8px;
    right: -12px;
    background: #e74c3c;
    color: white;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 10px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.15); border-radius: 999px; }
</style>
</head>
<body>

<div class="container">
    <header class="admin-header">
        <div>
            <h1>Painel de <span>Operações Gold</span></h1>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="notification-bell" onclick="verNotificacoes()">
                🔔
                <span class="notification-badge" id="notifCount">0</span>
            </div>
            <a href="dashboard.html" class="btn-back">← Dashboard</a>
        </div>
    </header>

    <div class="admin-grid">
        <div class="panel-box">
            <h3>👑 Staff Especializada</h3>
            <div class="team-list" id="listaEquipe">
                <div style="text-align:center; color:#8e8ea0;">Carregando equipe...</div>
            </div>
        </div>

        <div class="panel-box">
            <h3>✨ Adicionar Membro / Definir RA</h3>
            <form id="formMembro" onsubmit="adicionarMembro(event)">
                <div class="form-group">
                    <label>Nome / RA do Membro</label>
                    <input type="text" id="nomeMembro" placeholder="Ex: usuario_ra ou nome" required>
                </div>
                <div class="form-group">
                    <label>Cargo / Função</label>
                    <select id="cargoMembro">
                        <option value="OPERADOR">Operador</option>
                        <option value="MODERADOR">Moderador</option>
                        <option value="SUPORTE">Suporte</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>RA do Membro (para login)</label>
                    <input type="text" id="raMembro" placeholder="Digite o RA para vincular ao login">
                </div>
                <button type="submit" class="btn-submit">Vincular Membro</button>
            </form>
        </div>
    </div>

    <div class="admin-grid">
        <div class="panel-box">
            <h3>🔱 Despachar Ordem de Serviço</h3>
            <form id="formTarefa" onsubmit="criarTarefa(event)">
                <div class="form-group">
                    <label>Título do Objetivo</label>
                    <input type="text" id="tituloTarefa" placeholder="Ex: Corrigir Bypass do CMSP" required>
                </div>
                <div class="form-group">
                    <label>Descrição do que deve ser feito</label>
                    <textarea id="descTarefa" placeholder="Descreva os detalhes operacionais..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Direcionar para quem? (RA ou nome)</label>
                    <select id="responsavelTarefa">
                        <option value="">Selecione um membro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Prioridade de Execução</label>
                    <select id="prioridadeTarefa">
                        <option value="normal">Normal (Dourada)</option>
                        <option value="high">ALERTA CRÍTICO (Vermelha)</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Disparar Diretriz para o Time</button>
            </form>
        </div>

        <div class="panel-box">
            <h3>📊 Fluxo Operacional Ativo</h3>
            <div class="task-board" id="quadroTarefas">
                <div style="text-align:center; color:#8e8ea0;">Carregando tarefas...</div>
            </div>
        </div>
    </div>
</div>

<script>
const SENHA_MESTRE = "admin123";
let equipe = [];
let tarefas = [];

function carregarDados() {
    equipe = JSON.parse(localStorage.getItem('sala_sem_futuro_equipe') || '[]');
    if (equipe.length === 0) {
        equipe = [
            { id: 1, nome: "Admin Gold", ra: "admin", cargo: "OWNER" },
            { id: 2, nome: "Kuro", ra: "kuro123", cargo: "MODERADOR" },
            { id: 3, nome: "Vini_Dev", ra: "vini123", cargo: "SUPORTE" }
        ];
        localStorage.setItem('sala_sem_futuro_equipe', JSON.stringify(equipe));
    }
    
    tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    if (tarefas.length === 0) {
        tarefas = [
            { id: 101, titulo: "Atualizar imagens dos planos VIP", descricao: "Trocar a URL antiga pelas novas fotos.", responsavel: "vini123", prioridade: "normal", status: "concluida", criador: "Admin", data_criacao: new Date().toISOString() },
            { id: 102, titulo: "Monitorar queda do banco de dados", descricao: "Alguns RAs estão demorando para validar no login.", responsavel: "kuro123", prioridade: "high", status: "em_progresso", criador: "Admin", data_criacao: new Date().toISOString() }
        ];
        localStorage.setItem('sala_sem_futuro_tarefas', JSON.stringify(tarefas));
    }
    
    renderizarEquipe();
    renderizarTarefas();
    atualizarSelectResponsaveis();
    atualizarNotificacoes();
}

function renderizarEquipe() {
    const lista = document.getElementById('listaEquipe');
    lista.innerHTML = '';
    equipe.forEach(membro => {
        const div = document.createElement('div');
        div.className = 'team-member';
        div.innerHTML = `
            <div class="member-info">
                <h4><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#00ff88; margin-right:8px;"></span> ${membro.nome}</h4>
                <p>RA: ${membro.ra} • ${membro.cargo}</p>
            </div>
            ${membro.cargo !== 'OWNER' ? `<button class="btn-remove" onclick="removerMembro(${membro.id})">Remover</button>` : '<span style="color:#d4af37;">👑</span>'}
        `;
        lista.appendChild(div);
    });
}

function removerMembro(id) {
    if (confirm('Remover este membro da equipe?')) {
        equipe = equipe.filter(m => m.id !== id);
        localStorage.setItem('sala_sem_futuro_equipe', JSON.stringify(equipe));
        renderizarEquipe();
        atualizarSelectResponsaveis();
    }
}

function adicionarMembro(e) {
    e.preventDefault();
    const nome = document.getElementById('nomeMembro').value;
    const cargo = document.getElementById('cargoMembro').value;
    const ra = document.getElementById('raMembro').value;
    
    const novoId = equipe.length > 0 ? Math.max(...equipe.map(m => m.id)) + 1 : 4;
    equipe.push({ id: novoId, nome: nome, ra: ra, cargo: cargo });
    localStorage.setItem('sala_sem_futuro_equipe', JSON.stringify(equipe));
    
    document.getElementById('formMembro').reset();
    renderizarEquipe();
    atualizarSelectResponsaveis();
}

function atualizarSelectResponsaveis() {
    const select = document.getElementById('responsavelTarefa');
    select.innerHTML = '<option value="">Selecione um membro</option>';
    equipe.forEach(membro => {
        if (membro.cargo !== 'OWNER') {
            const option = document.createElement('option');
            option.value = membro.ra;
            option.innerText = `${membro.nome} (${membro.ra})`;
            select.appendChild(option);
        }
    });
}

function criarTarefa(e) {
    e.preventDefault();
    const titulo = document.getElementById('tituloTarefa').value;
    const descricao = document.getElementById('descTarefa').value;
    const responsavel = document.getElementById('responsavelTarefa').value;
    const prioridade = document.getElementById('prioridadeTarefa').value;
    
    if (!responsavel) {
        alert('Selecione um responsável para a tarefa!');
        return;
    }
    
    const novoId = tarefas.length > 0 ? Math.max(...tarefas.map(t => t.id)) + 1 : 200;
    const novaTarefa = {
        id: novoId,
        titulo: titulo,
        descricao: descricao,
        responsavel: responsavel,
        prioridade: prioridade,
        status: 'pendente',
        criador: 'Admin',
        data_criacao: new Date().toISOString()
    };
    
    tarefas.unshift(novaTarefa);
    localStorage.setItem('sala_sem_futuro_tarefas', JSON.stringify(tarefas));
    
    document.getElementById('formTarefa').reset();
    renderizarTarefas();
}

function renderizarTarefas() {
    const quadro = document.getElementById('quadroTarefas');
    quadro.innerHTML = '';
    
    if (tarefas.length === 0) {
        quadro.innerHTML = '<div style="text-align:center; color:#8e8ea0;">Nenhuma tarefa cadastrada.</div>';
        return;
    }
    
    tarefas.forEach(tarefa => {
        const card = document.createElement('div');
        let classe = 'task-card';
        if (tarefa.prioridade === 'high') classe += ' high';
        if (tarefa.status === 'aguardando_revisao') classe += ' review';
        if (tarefa.status === 'concluida') classe += ' done';
        card.className = classe;
        
        let statusText = '🔵 EM FILA';
        let statusColor = '#61b5ff';
        if (tarefa.status === 'em_progresso') { statusText = '⚡ EM PROGRESSO'; statusColor = '#ffcc00'; }
        if (tarefa.status === 'aguardando_revisao') { statusText = '⏳ AGUARDANDO REVISÃO'; statusColor = '#ff9f43'; }
        if (tarefa.status === 'concluida') { statusText = '🏆 CONCLUÍDO'; statusColor = '#d4af37'; }
        
        const membro = equipe.find(m => m.ra === tarefa.responsavel);
        const nomeResponsavel = membro ? membro.nome : tarefa.responsavel;
        
        card.innerHTML = `
            <div class="task-header">
                <span>ID: #${tarefa.id}</span>
                <span style="color: ${tarefa.prioridade === 'high' ? '#e74c3c' : '#8e8ea0'};">
                    ${tarefa.prioridade === 'high' ? 'CRÍTICO' : 'REGULAR'}
                </span>
            </div>
            <div class="task-title">${tarefa.titulo}</div>
            <div class="task-desc">${tarefa.descricao}</div>
            <div class="task-footer">
                <span class="task-user">👤 Responsável: ${nomeResponsavel}</span>
                <div>
                    ${tarefa.status === 'aguardando_revisao' ? `
                        <button class="badge-status badge-approve" onclick="aprovarTarefa(${tarefa.id})">✅ Aprovar</button>
                        <button class="badge-status badge-reject" onclick="rejeitarTarefa(${tarefa.id})">❌ Rejeitar</button>
                    ` : `
                        <span class="badge-status" style="color: ${statusColor};">${statusText}</span>
                    `}
                </div>
            </div>
        `;
        quadro.appendChild(card);
    });
}

function aprovarTarefa(id) {
    const senha = prompt("🛡️ Aprovação Master necessária. Insira a Chave Ouro:");
    if (senha === SENHA_MESTRE) {
        const index = tarefas.findIndex(t => t.id === id);
        if (index !== -1) {
            tarefas[index].status = 'concluida';
            localStorage.setItem('sala_sem_futuro_tarefas', JSON.stringify(tarefas));
            renderizarTarefas();
            alert('✅ Tarefa aprovada e concluída!');
        }
    } else if (senha !== null) {
        alert("Senha inválida!");
    }
}

function rejeitarTarefa(id) {
    const senha = prompt("🛡️ Aprovação Master necessária para rejeitar:");
    if (senha === SENHA_MESTRE) {
        const index = tarefas.findIndex(t => t.id === id);
        if (index !== -1) {
            tarefas[index].status = 'pendente';
            localStorage.setItem('sala_sem_futuro_tarefas', JSON.stringify(tarefas));
            renderizarTarefas();
            alert('❌ Tarefa rejeitada. Retornou para pendente.');
        }
    } else if (senha !== null) {
        alert("Senha inválida!");
    }
}

function atualizarNotificacoes() {
    const notificacoes = JSON.parse(localStorage.getItem('sala_sem_futuro_notificacao') || 'null');
    const count = notificacoes ? 1 : 0;
    document.getElementById('notifCount').innerText = count;
}

function verNotificacoes() {
    const notificacao = JSON.parse(localStorage.getItem('sala_sem_futuro_notificacao') || 'null');
    if (notificacao) {
        alert(`📢 Nova solicitação!\n\nTarefa: ${notificacao.tarefaTitulo}\nOperador: ${notificacao.operador}\nAguardando sua aprovação.`);
        localStorage.removeItem('sala_sem_futuro_notificacao');
        atualizarNotificacoes();
        renderizarTarefas();
    } else {
        alert("Nenhuma notificação pendente.");
    }
}

// Inicialização
carregarDados();
setInterval(() => {
    carregarDados();
    atualizarNotificacoes();
}, 3000);
</script>
</body>
</html>
