<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050507; --card: rgba(13,13,18,0.95); --gold: #d4af37;
  --border: rgba(212,175,55,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Syne', sans-serif; background: var(--bg); color: #e8e8f0;
  min-height: 100vh;
}
.bg-grid { position:fixed; inset:0; background-image: linear-gradient(rgba(212,175,55,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(212,175,55,0.03) 1px,transparent 1px); background-size:52px 52px; z-index:0; }

.page { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:30px; }

.header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--border);
}
.header h1 { font-size:2.2rem; color:var(--gold); }

.card {
  background: var(--card); border:1px solid var(--border);
  border-radius:24px; padding:24px; margin-bottom:24px;
}

table {
  width:100%; border-collapse:collapse; margin-top:16px;
}
th, td {
  padding:14px; text-align:left; border-bottom:1px solid rgba(212,175,55,0.1);
  font-family: 'Space Mono', monospace;
}
th { color:var(--gold); font-size:0.85rem; text-transform:uppercase; }

.btn {
  padding:10px 20px; border:none; border-radius:12px; cursor:pointer;
  font-weight:700;
}
.btn-approve { background:#00ff88; color:#0a0a10; }
.btn-reject { background:#ff4757; color:white; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="page">
  <div class="header">
    <h1>🔧 PAINEL DA EQUIPE</h1>
    <button onclick="deslogarAdmin()" style="background:#333;color:#aaa;padding:10px 20px;border-radius:999px;border:none;">Sair</button>
  </div>

  <div class="card">
    <h2 style="margin-bottom:16px;color:var(--gold);">Tarefas Pendentes dos Alunos</h2>
    <table id="tarefasTable">
      <thead>
        <tr><th>ID</th><th>Aluno</th><th>Título</th><th>Nível</th><th>Data</th><th>Ações</th></tr>
      </thead>
      <tbody id="tarefasBody"></tbody>
    </table>
  </div>
</div>

<script>
// Simulação de tarefas da equipe
let tarefasEquipe = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas_alunos') || '[]');

function renderTarefas() {
  const tbody = document.getElementById('tarefasBody');
  tbody.innerHTML = tarefasEquipe.map(t => `
    <tr>
      <td>#${t.id.toString().slice(-4)}</td>
      <td>${t.aluno}</td>
      <td>${t.titulo}</td>
      <td>${t.nivel || 'A2'}</td>
      <td>${new Date(t.data).toLocaleDateString('pt-BR')}</td>
      <td>
        <button class="btn btn-approve" onclick="aprovarTarefa(${t.id})">Aprovar</button>
        <button class="btn btn-reject" onclick="rejeitarTarefa(${t.id})">Rejeitar</button>
      </td>
    </tr>
  `).join('');
}

function aprovarTarefa(id) {
  alert(`Tarefa #${id} aprovada e enviada ao aluno!`);
  tarefasEquipe = tarefasEquipe.filter(t => t.id !== id);
  localStorage.setItem('sala_sem_futuro_tarefas_alunos', JSON.stringify(tarefasEquipe));
  renderTarefas();
}

function rejeitarTarefa(id) {
  const motivo = prompt("Motivo da rejeição:");
  if (motivo) {
    alert(`Tarefa #${id} rejeitada. Motivo: ${motivo}`);
    tarefasEquipe = tarefasEquipe.filter(t => t.id !== id);
    localStorage.setItem('sala_sem_futuro_tarefas_alunos', JSON.stringify(tarefasEquipe));
    renderTarefas();
  }
}

function deslogarAdmin() {
  if (confirm("Sair do painel administrativo?")) window.location.href = "index.html";
}

// Init
renderTarefas();
setInterval(renderTarefas, 8000);
</script>
</body>
</html>
