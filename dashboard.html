<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS - Dashboard</title>
<style>
:root {
    --bg: #07070a;
    --card: #0f0f16;
    --border: rgba(212,175,55,.12);
    --primary: #d4af37;
    --primary-dark: #aa7c11;
    --primary-light: #f3e5ab;
    --green: #00ff88;
    --amber: #f5a623;
    --amber-glow: rgba(245,166,35,.35);
    --red: #e74c3c;
    --gradient-gold: linear-gradient(135deg, #f3e5ab, #d4af37, #aa7c11);
    --gradient-dark: linear-gradient(135deg, #aa7c11, #5a3e00);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: #050507;
    color: white;
    min-height: 100vh;
    position: relative;
    padding-bottom: 120px;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('https://i.postimg.cc/gky5YNH2/1778823817951-3.jpg') center/cover no-repeat;
    opacity: .10;
    z-index: -2;
}

body.beta-mode::before {
    background: url('https://i.postimg.cc/gjG6L4Yq/IMG-20260519-0001.jpg') center/cover no-repeat;
    opacity: .12;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9));
    z-index: -1;
}

.page { padding: 22px; max-width: 480px; margin: 0 auto; }

.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; justify-content: space-between; }

.user-info-title { 
    font-size: 1rem; font-weight: 700; 
    background: rgba(212,175,55,.1); 
    padding: 6px 12px; 
    border-radius: 20px;
    border: 1px solid rgba(212,175,55,.2);
}

.glass {
    background: #0f0f14;
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    transition: border-color 0.3s, box-shadow 0.3s;
}

.status-panel {
    padding: 20px;
    border-radius: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    background: rgba(255,255,255,.02);
    border: 1px solid var(--border);
}

.status-indicator h2 {
    font-size: 1.2rem;
    font-weight: 800;
    display: flex;
    align-items: center;
}

.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 10px;
}

.status-dot.free { background: #00ff88; box-shadow: 0 0 8px rgba(0,255,136,.6); }
.status-dot.beta { background: var(--gradient-gold); box-shadow: 0 0 10px rgba(212,175,55,.7); }

.switch-container {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,.3);
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
}

.switch-label { font-weight: bold; font-size: 0.85rem; color: var(--primary); }
.switch { position: relative; display: inline-block; width: 50px; height: 26px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #222;
    transition: .3s;
    border-radius: 34px;
    border: 1px solid rgba(255,255,255,.05);
}
.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}
input:checked + .slider { background: var(--gradient-gold); }
input:checked + .slider:before { transform: translateX(24px); }

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 25px;
}

.stat-card {
    padding: 20px;
    border-radius: 24px;
}

.stat-card h2 { font-size: 2.2rem; margin-top: 8px; font-weight: 800; color: var(--primary); }

.grid { display: flex; flex-direction: column; gap: 20px; }

.module-card {
    padding: 24px;
    border-radius: 24px;
}

.module-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.module-title { font-size: 1.5rem; font-weight: 800; }
.module-desc {
    font-size: .95rem;
    line-height: 1.6;
    color: #9d9db1;
    margin: 12px 0 20px;
}

.badge {
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 800;
    font-size: .75rem;
}
.online { background: rgba(0,255,136,.12); color: #00ff88; }
.beta { background: rgba(212,175,55,.12); color: var(--primary); }
.ready { background: rgba(245,166,35,.12); color: var(--amber); }

.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 18px;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    text-align: center;
}
.btn-primary { 
    background: var(--gradient-gold); 
    color: #080810; 
    box-shadow: 0 4px 12px rgba(212,175,55,.3);
    transition: all 0.3s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,175,55,.5); filter: brightness(1.05); }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: #d4d4e2; margin-top: 12px; }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-beta { background: var(--gradient-gold); color: #080810; font-weight: 800; margin-bottom: 15px; box-shadow: 0 4px 16px rgba(212,175,55,.4); }

.bottom-nav {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 460px;
    padding: 12px;
    border-radius: 999px;
    display: flex;
    justify-content: space-around;
    background: #0c0c10;
    border: 1px solid var(--border);
    z-index: 999;
}

.nav-btn {
    background: none;
    border: none;
    color: #8e8ea0;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
}
.nav-btn:hover { color: var(--primary); }
.nav-btn.active { color: var(--primary); }

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 9999;
}
.modal-box {
    width: 100%;
    max-width: 500px;
    padding: 28px;
    border-radius: 24px;
    text-align: center;
    max-height: 85vh;
    overflow-y: auto;
}

.progress-container {
    width: 100%;
    height: 8px;
    border-radius: 999px;
    overflow: hidden;
    margin: 20px 0;
    background: rgba(255,255,255,.05);
}
.progress-bar {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: var(--gradient-gold);
    transition: width .08s linear;
    box-shadow: 0 0 12px rgba(212,175,55,.4);
}

.logs {
    background: #020202;
    border: 1px solid rgba(212,175,55,.15);
    font-family: monospace;
    font-size: .72rem;
    color: var(--primary-light);
    height: 140px;
    overflow-y: auto;
    padding: 14px;
    border-radius: 14px;
    line-height: 1.6;
    text-align: left;
}

.input-group { margin-bottom: 18px; }
.input-group label { display: block; font-size: .75rem; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; color: #b5b5c3; }
.input-group select, .input-group input, .input-group textarea {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(212,175,55,.15);
    background: rgba(0,0,0,.45);
    color: white;
    outline: none;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 8px rgba(212,175,55,.3);
}
.input-group textarea { resize: vertical; }

#levelsGridSpeak {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin: 20px 0;
    max-height: 350px;
    overflow-y: auto;
}

.level-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all .2s ease;
}
.level-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.level-card.locked { opacity: 0.5; cursor: not-allowed; }
.level-card.active { border-color: var(--primary); background: rgba(212,175,55,.1); }

.lv-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; color: var(--primary-light); }
.lv-desc { font-size: 0.7rem; color: #8e8ea0; }

.lessons-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
.lesson-row {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.lesson-row.running { border-color: var(--amber); background: rgba(245,166,35,.05); }
.lesson-row.done { border-color: var(--green); background: rgba(0,255,136,.04); }
.lesson-row.error { border-color: var(--red); background: rgba(231,76,60,.04); }

.lr-info { flex: 1; text-align: left; margin-left: 12px; }
.lr-title { font-size: 0.85rem; font-weight: 600; color: var(--primary-light); }
.lr-meta { font-size: 0.65rem; color: #8e8ea0; }

.lr-status { font-size: 0.7rem; padding: 4px 8px; border-radius: 8px; }
.lr-status.idle { color: #8e8ea0; }
.lr-status.running { color: var(--amber); }
.lr-status.done { color: var(--green); }
.lr-status.error { color: var(--red); }

.lr-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
}
.lr-btn:hover { background: var(--primary); border-color: var(--primary); color: #080810; }

.action-bar { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; justify-content: center; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.module-card, .stat-card, .status-panel { animation: fadeIn 0.4s ease-out; }

.beta-mode .glass, .beta-mode .module-card, .beta-mode .stat-card, .beta-mode .status-panel, .beta-mode .modal-box {
    border: 1px solid rgba(212,175,55,.35);
    box-shadow: 0 0 15px rgba(212,175,55,.18);
}
body.beta-mode h1, body.beta-mode .module-title {
    background: var(--gradient-gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,.3); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: rgba(212,175,55,.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,.5); }
</style>
</head>
<body>

<div id="dashboardPage" class="page">
    <div class="logo">
        <h1 id="userHeaderTitle" class="user-info-title">Carregando...</h1>
        <div class="switch-container">
            <span class="switch-label" id="switchTexto">FREE</span>
            <label class="switch">
                <input type="checkbox" id="betaSwitch" onchange="ativarBeta()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="status-panel glass">
        <div><h3 style="font-size:1rem;color:#9d9db1;">Status do Plano</h3></div>
        <div class="status-indicator">
            <h2 id="statusPlano" class="free-status"><span class="status-dot free"></span>ON FREE</h2>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card glass">
            <small style="color:#9d9db1;">Execuções Ativas</small>
            <h2 id="execucoesAtivas">0</h2>
        </div>
        <div class="stat-card glass">
            <small style="color:#9d9db1;">Tarefas Pendentes</small>
            <h2 id="tarefasPendentes">0</h2>
        </div>
    </div>

    <div class="grid">
        <div class="module-card glass" id="moduleKuroSpeak">
            <div class="module-top">
                <span class="module-title">KuroSpeak IA</span>
                <span class="badge online" id="kuroSpeakStatus">ONLINE</span>
            </div>
            <p class="module-desc">Sistema inteligente de automação de lições do SPEAK.</p>
            <button class="btn btn-primary" onclick="abrirModalSpeak()">🎯 Injetar Módulo</button>
        </div>
        <div class="module-card glass">
            <div class="module-top">
                <span class="module-title">GhostWriter Pro</span>
                <span class="badge beta">BETA</span>
            </div>
            <p class="module-desc">Sistema avançado de geração de conteúdo.</p>
            <button class="btn btn-primary" onclick="abrirModalGhost()">✍️ Ativar GhostWriter</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active" onclick="scrollToTop()">🏠 Home</button>
    <button class="nav-btn" onclick="verMinhasTarefas()">📋 Tarefas</button>
    <button class="nav-btn" onclick="abrirConfiguracoes()">⚙️ Config</button>
    <button class="nav-btn" onclick="deslogarSistema()">🚪 Sair</button>
</div>

<div class="modal" id="taskModal">
    <div class="modal-box glass" id="modalContent"></div>
</div>

<script>
// ==================== VERIFICAÇÃO DE LOGIN ====================
const userRA = localStorage.getItem('sala_sem_futuro_ra');
if (!userRA) { window.location.href = 'login.html'; }
document.getElementById('userHeaderTitle').innerHTML = `👤 ${userRA.slice(0,12)}... | RA: ${userRA.slice(-6)}`;

// ==================== BACKEND LUNAR ====================
const STORAGE_KEY = 'sala_sem_futuro_tokens';
const API_BASE = 'https://learn.crimsonzerohub.xyz';
const COURSE_ID = '87e8ec1d-a478-4d39-badd-4ddb20494eaf';

let currentTokens = null;
let currentLevels = [];
let currentLessons = [];
let lessonState = {};
let autoRunning = false;
let speakModalOpen = false;

// ==================== FUNÇÕES DE TOKEN ====================
function loadSavedTokens() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            currentTokens = JSON.parse(saved);
            const statusEl = document.getElementById('kuroSpeakStatus');
            statusEl.innerHTML = '⚡ PRONTO';
            statusEl.className = 'badge ready';
            return true;
        } catch(e) {}
    }
    return false;
}

function saveTokens(tokens) {
    currentTokens = tokens;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tokens));
    const statusEl = document.getElementById('kuroSpeakStatus');
    statusEl.innerHTML = '⚡ PRONTO';
    statusEl.className = 'badge ready';
}

function extractAccess() {
    const efid = currentTokens?.efid_tokens;
    if (!efid) return '';
    if (typeof efid === 'object') return efid.access || '';
    try { return JSON.parse(efid).access || ''; } catch { return ''; }
}

function extractAccount() {
    const efid = currentTokens?.efid_tokens;
    if (!efid) return '';
    if (typeof efid === 'object') return efid.account || '';
    try { return JSON.parse(efid).account || ''; } catch { return ''; }
}
// ==================== API DO LUNAR ====================
async function apiPost(endpoint, body) {
    const r = await fetch(`${API_BASE}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokens: currentTokens, ...body }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
    return data;
}

async function loadLevels() {
    const data = await apiPost('/api/levels', {});
    currentLevels = data.levels || [];
    return currentLevels;
}

async function loadLevelDetail(levelId) {
    const data = await apiPost('/api/level-detail', { level_id: levelId });
    const units = data.units || data.lessons || data.nodes || [];
    let nodes = [];
    for (const u of units) {
        const children = u.lessons || u.nodes || u.activities || [];
        if (children.length) {
            nodes.push(...children.map(c => ({ ...c, _unitName: u.name || u.title || '' })));
        } else if (u.id) {
            nodes.push(u);
        }
    }
    return nodes.length ? nodes : units;
}

async function openLesson(nodeId) {
    return await apiPost('/api/open-lesson', { node_id: nodeId });
}

async function autoCompleteLesson(lessonId, lastVersion, sessionId, events) {
    return await apiPost('/api/auto-complete', {
        lesson_id: lessonId,
        last_version: lastVersion,
        session_id: sessionId,
        events: events,
    });
}

async function completeLesson(lessonId, nodeId, lastVersion, enrollmentId) {
    return await apiPost('/api/complete-lesson', {
        lesson_id: lessonId,
        node_id: nodeId,
        last_version: lastVersion,
        enrollment_id: enrollmentId || COURSE_ID,
    });
}

async function runLesson(nodeId, updateProgress) {
    lessonState[nodeId] = { status: 'running' };
    if (updateProgress) updateProgress(nodeId);

    try {
        addLog(`🎯 [${nodeId.slice(0,8)}] Abrindo lição...`, 'amber');
        const opened = await openLesson(nodeId);
        const lessonId = opened.lessonId;
        const lastVersion = opened.lastVersion || 0;
        const resp = opened.commandResponse || {};
        const history = resp.eventHistory || resp.state?.eventHistory || {};
        const events = history.events || [];
        const sessionId = resp.state?.sessionId || resp.sessionId || '';

        addLog(`📊 [${nodeId.slice(0,8)}] ${events.length} eventos | v${lastVersion}`, 'info');

        lessonState[nodeId] = { status: 'running', lessonId, lastVersion, sessionId, events };
        if (updateProgress) updateProgress(nodeId);

        const hasActivities = events.some(e => e.type === 'activity-sent');
        let newVersion = lastVersion;

        if (hasActivities) {
            addLog(`⚡ [${nodeId.slice(0,8)}] Processando...`, 'amber');
            const ac = await autoCompleteLesson(lessonId, lastVersion, sessionId, events);
            newVersion = ac.new_last_version || lastVersion;
            addLog(`✅ [${nodeId.slice(0,8)}] ${ac.commands_sent} comandos`, 'green');
        } else {
            addLog(`📝 [${nodeId.slice(0,8)}] Sem atividades`, 'info');
        }

        await completeLesson(lessonId, nodeId, newVersion, null);
        addLog(`🎉 [${nodeId.slice(0,8)}] Concluída!`, 'green');

        lessonState[nodeId] = { status: 'done', lessonId };
        if (updateProgress) updateProgress(nodeId);

        const doneCount = Object.values(lessonState).filter(s => s.status === 'done').length;
        const totalCount = Object.keys(lessonState).length;
        document.getElementById('execucoesAtivas').innerText = `${doneCount}/${totalCount}`;

    } catch(e) {
        addLog(`❌ [${nodeId.slice(0,8)}] Erro: ${e.message}`, 'red');
        lessonState[nodeId] = { status: 'error', error: e.message };
        if (updateProgress) updateProgress(nodeId);
    }
}

function addLog(msg, type = 'info') {
    const logsDiv = document.getElementById('speakLogs');
    if (!logsDiv) return;
    const line = document.createElement('div');
    const time = new Date().toLocaleTimeString('pt-BR');
    const colors = { green: '#00ff88', amber: '#f5a623', red: '#e74c3c', info: '#d4af37' };
    line.innerHTML = `<span style="color:#666">[${time}]</span> <span style="color:${colors[type] || colors.info}">${msg}</span>`;
    logsDiv.appendChild(line);
    logsDiv.scrollTop = logsDiv.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
// ==================== MODAL SPEAK ====================
function abrirModalSpeak() {
    if (speakModalOpen) return;
    speakModalOpen = true;
    
    const caixa = document.getElementById('modalContent');
    caixa.innerHTML = `
        <h2 style="margin-bottom:20px; color: var(--primary);">🤖 KuroSpeak IA</h2>
        
        <div style="background:rgba(0,0,0,.3); border-radius:16px; padding:15px; margin-bottom:20px;">
            <div class="input-group">
                <label>🔑 Tokens SPEAK (Base64)</label>
                <textarea id="tokenInput" placeholder="Cole o token Base64 aqui..." rows="2"></textarea>
                <small style="color:#8e8ea0; font-size:0.65rem;">Obtenha o token pela extensão</small>
            </div>
            <button class="btn btn-beta" onclick="validarTokens()" style="margin:0;">🔓 Validar Tokens</button>
            <div id="tokenStatus" style="margin-top:10px; font-size:0.8rem;"></div>
        </div>
        
        <div id="speakContent" style="display:none;">
            <div class="action-bar">
                <button class="btn btn-primary" onclick="carregarNiveisSpeak()" style="width:auto;">📚 Carregar Níveis</button>
                <button class="btn btn-secondary" onclick="atualizarProgressoGeral()" style="width:auto;">🔄 Atualizar</button>
            </div>
            <div id="levelsGridSpeak"></div>
            <div id="lessonsPanelSpeak" style="display:none;">
                <div class="action-bar">
                    <button class="btn btn-primary" onclick="autoCompleteAllLessons()" style="width:auto;">▶ Completar Todas</button>
                    <button class="btn btn-secondary" onclick="fecharLessonsPanel()" style="width:auto;">← Voltar</button>
                </div>
                <div id="lessonsListSpeak" class="lessons-list"></div>
            </div>
        </div>
        
        <div class="logs" id="speakLogs" style="margin-top:20px; height:120px;"></div>
        <small style="color:#666;">Backend Lunar • Auto-complete inteligente</small>
        <button class="btn btn-secondary" onclick="fecharModalSpeak()" style="margin-top:15px;">Fechar</button>
    `;
    
    document.getElementById('taskModal').style.display = 'flex';
    
    if (currentTokens) {
        document.getElementById('tokenStatus').innerHTML = '<span style="color:#00ff88;">✓ Tokens carregados</span>';
        document.getElementById('speakContent').style.display = 'block';
        carregarNiveisSpeak();
    }
}

function fecharModalSpeak() {
    speakModalOpen = false;
    document.getElementById('taskModal').style.display = 'none';
}

async function validarTokens() {
    const tokenInput = document.getElementById('tokenInput').value.trim();
    const statusDiv = document.getElementById('tokenStatus');
    
    if (!tokenInput) {
        statusDiv.innerHTML = '<span style="color:#e74c3c;">❌ Cole o token Base64</span>';
        return;
    }
    
    try {
        statusDiv.innerHTML = '<span style="color:#f5a623;">⏳ Decodificando...</span>';
        const json = decodeURIComponent(escape(atob(tokenInput)));
        const parsed = JSON.parse(json);
        
        const tokens = {};
        for (const [k, v] of Object.entries(parsed)) {
            if (k === 'catalyst_token' && typeof v === 'string') {
                try { tokens[k] = decodeURIComponent(v); }
                catch { tokens[k] = v; }
            } else {
                tokens[k] = v;
            }
        }
        
        if (typeof tokens.efid_tokens === 'string') {
            try { tokens.efid_tokens = JSON.parse(decodeURIComponent(tokens.efid_tokens)); }
            catch { try { tokens.efid_tokens = JSON.parse(tokens.efid_tokens); } catch {} }
        }
        
        saveTokens(tokens);
        statusDiv.innerHTML = '<span style="color:#00ff88;">✅ Tokens validados!</span>';
        document.getElementById('speakContent').style.display = 'block';
        addLog('Tokens carregados!', 'green');
        carregarNiveisSpeak();
        
    } catch(e) {
        statusDiv.innerHTML = `<span style="color:#e74c3c;">❌ Erro: ${e.message}</span>`;
        addLog(`Erro: ${e.message}`, 'red');
    }
}
async function carregarNiveisSpeak() {
    if (!currentTokens) {
        addLog('Cole os tokens primeiro!', 'red');
        return;
    }
    
    addLog('Carregando níveis...', 'amber');
    const levelsDiv = document.getElementById('levelsGridSpeak');
    levelsDiv.innerHTML = '<div style="text-align:center; color:#8e8ea0;">⏳ Carregando...</div>';
    
    try {
        const levels = await loadLevels();
        currentLevels = levels;
        
        if (!levels.length) {
            levelsDiv.innerHTML = '<div style="text-align:center; color:#e74c3c;">Nenhum nível</div>';
            return;
        }
        
        levelsDiv.innerHTML = '';
        for (const lv of levels) {
            const card = document.createElement('div');
            card.className = 'level-card' + (lv.isLocked ? ' locked' : '');
            card.onclick = () => { if (!lv.isLocked) selectLevelSpeak(lv); };
            card.innerHTML = `
                <div class="lv-title">${lv.title || 'Nível ' + (lv.sequenceNumber || '?')}</div>
                <div class="lv-desc">${(lv.description || '').slice(0,60)}</div>
            `;
            levelsDiv.appendChild(card);
        }
        addLog(`${levels.length} níveis carregados`, 'green');
        
    } catch(e) {
        levelsDiv.innerHTML = `<div style="text-align:center; color:#e74c3c;">Erro: ${e.message}</div>`;
        addLog(`Erro: ${e.message}`, 'red');
    }
}

async function selectLevelSpeak(lv) {
    addLog(`📖 Carregando lições: ${lv.title}`, 'amber');
    
    const levelsDiv = document.getElementById('levelsGridSpeak');
    const lessonsPanel = document.getElementById('lessonsPanelSpeak');
    const lessonsList = document.getElementById('lessonsListSpeak');
    
    levelsDiv.style.display = 'none';
    lessonsPanel.style.display = 'block';
    lessonsList.innerHTML = '<div style="text-align:center; color:#8e8ea0;">⏳ Carregando...</div>';
    
    try {
        const lessons = await loadLevelDetail(lv.id);
        currentLessons = lessons;
        lessonState = {};
        
        lessonsList.innerHTML = '';
        for (const node of lessons) {
            const title = node.name || node.title || node.lessonTitle || `Lição ${node.id.slice(0,8)}`;
            const meta = node._unitName || node.type || '';
            
            const row = document.createElement('div');
            row.id = `speak-row-${node.id}`;
            row.className = 'lesson-row';
            row.innerHTML = `
                <div class="lr-info">
                    <div class="lr-title">${title}</div>
                    <div class="lr-meta">${meta}</div>
                </div>
                <div class="lr-status idle" id="speak-st-${node.id}">⏳ aguardando</div>
                <button class="lr-btn" onclick="runSingleLesson('${node.id}')">▶ Iniciar</button>
            `;
            lessonsList.appendChild(row);
        }
        
        addLog(`${lessons.length} lições carregadas`, 'green');
        document.getElementById('execucoesAtivas').innerText = `0/${lessons.length}`;
        
    } catch(e) {
        lessonsList.innerHTML = `<div style="text-align:center; color:#e74c3c;">Erro: ${e.message}</div>`;
        addLog(`Erro: ${e.message}`, 'red');
    }
}

function fecharLessonsPanel() {
    document.getElementById('levelsGridSpeak').style.display = 'grid';
    document.getElementById('lessonsPanelSpeak').style.display = 'none';
}

function updateLessonRow(nodeId) {
    const st = lessonState[nodeId];
    if (!st) return;
    
    const stEl = document.getElementById(`speak-st-${nodeId}`);
    const row = document.getElementById(`speak-row-${nodeId}`);
    const btn = row?.querySelector('.lr-btn');
    
    if (st.status === 'running') {
        row?.classList.add('running');
        if (stEl) { stEl.className = 'lr-status running'; stEl.innerHTML = '⚡ executando...'; }
        if (btn) { btn.disabled = true; btn.innerHTML = '⏳'; }
    } else if (st.status === 'done') {
        row?.classList.add('done');
        if (stEl) { stEl.className = 'lr-status done'; stEl.innerHTML = '✅ concluído'; }
        if (btn) { btn.disabled = true; btn.innerHTML = '✓'; }
    } else if (st.status === 'error') {
        row?.classList.add('error');
        if (stEl) { stEl.className = 'lr-status error'; stEl.innerHTML = '⚠️ erro'; }
        if (btn) { btn.disabled = false; btn.innerHTML = '⟳ Tentar'; }
    }
}

async function runSingleLesson(nodeId) {
    await runLesson(nodeId, updateLessonRow);
}

async function autoCompleteAllLessons() {
    if (autoRunning) return;
    autoRunning = true;
    
    const pending = currentLessons.filter(n => {
        const s = lessonState[n.id]?.status;
        return !s || s === 'error';
    });
    
    if (pending.length === 0) {
        addLog('Todas concluídas!', 'green');
        autoRunning = false;
        return;
    }
    
    addLog(`🚀 Iniciando: ${pending.length} lições`, 'info');
    
    for (let i = 0; i < pending.length; i++) {
        const node = pending[i];
        addLog(`📌 Lição ${i+1}/${pending.length}`, 'amber');
        await runLesson(node.id, updateLessonRow);
        if (i < pending.length - 1) await sleep(1500);
    }
    
    autoRunning = false;
    addLog('🎉 Auto-complete finalizado!', 'green');
}

function atualizarProgressoGeral() {
    if (!currentLessons.length) {
        addLog('Selecione um nível primeiro.', 'info');
        return;
    }
    const done = Object.values(lessonState).filter(s => s.status === 'done').length;
    const total = currentLessons.length;
    addLog(`📊 Progresso: ${done}/${total} concluídas`, 'info');
    document.getElementById('execucoesAtivas').innerText = `${done}/${total}`;
}

        </div>
        <button class="btn btn-secondary" onclick="fecharModalSpeak()" style="margin-top:20px;">Fechar</button>
    `;
    document.getElementById('taskModal').style.display = 'flex';
}

function verMinhasTarefas() {
    const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    const minhasTarefas = tarefas.filter(t => t.responsavel === userRA || t.responsavel === userRA.split('@')[0]);
    
    const caixa = document.getElementById('modalContent');
    if (minhasTarefas.length === 0) {
        caixa.innerHTML = `
            <h2 style="color: var(--primary);">📋 Minhas Tarefas</h2>
            <p style="color:#8e8ea0;">Nenhuma tarefa atribuída.</p>
            <button class="btn btn-secondary" onclick="fecharModalSpeak()">Fechar</button>
        `;
    } else {
        let html = `<h2 style="color: var(--primary);">📋 Minhas Tarefas (${minhasTarefas.length})</h2>`;
        minhasTarefas.forEach(t => {
            let statusText = '🔵 EM FILA';
            let statusColor = '#61b5ff';
            if (t.status === 'em_progresso') { statusText = '⚡ EM PROGRESSO'; statusColor = '#ffcc00'; }
            if (t.status === 'aguardando_revisao') { statusText = '⏳ AGUARDANDO REVISÃO'; statusColor = '#ff9f43'; }
            if (t.status === 'concluida') { statusText = '🏆 CONCLUÍDO'; statusColor = '#d4af37'; }
            
            html += `
                <div style="background:rgba(0,0,0,.3); border-left:4px solid ${t.prioridade === 'high' ? '#e74c3c' : '#d4af37'}; padding:15px; margin-bottom:10px; text-align:left;">
                    <div style="font-weight:700;">${t.titulo}</div>
                    <div style="font-size:0.75rem; color:#8e8ea0;">${t.descricao}</div>
                    <div style="margin-top:10px;"><span style="color:${statusColor};">${statusText}</span></div>
                </div>
            `;
        });
        html += `<button class="btn btn-secondary" onclick="fecharModalSpeak()">Fechar</button>`;
        caixa.innerHTML = html;
    }
    document.getElementById('taskModal').style.display = 'flex';
}

function abrirConfiguracoes() {
    const caixa = document.getElementById('modalContent');
    caixa.innerHTML = `
        <h2 style="color: var(--primary);">⚙️ Configurações</h2>
        <div class="input-group"><label>API Base</label><input type="text" id="apiBaseInput" value="${API_BASE}"></div>

        <div style="margin-top:15px; padding:10px; background:rgba(0,0,0,.3); border-radius:12px;">
            <p style="font-size:0.7rem;">RA: ${userRA}</p>
            <p style="font-size:0.7rem;">Tokens: ${currentTokens ? '✅' : '❌'}</p>
        </div>
        <button class="btn btn-secondary" onclick="fecharModalSpeak()" style="margin-top:15px;">Fechar</button>
    `;
    document.getElementById('taskModal').style.display = 'flex';

    document.body.classList.toggle('beta-mode');
    const status = document.getElementById('statusPlano');
    const texto = document.getElementById('switchTexto');
    
    if(document.body.classList.contains('beta-mode')){

    if (confirm('Deseja sair?')) {
        localStorage.removeItem('sala_sem_futuro_logged');
        window.location.href = 'login.html';
    }
}

function atualizarTarefasPendentes() {
    const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    const minhasTarefas = tarefas.filter(t => t.responsavel === userRA || t.responsavel === userRA.split('@')[0]);
    const pendentes = minhasTarefas.filter(t => t.status !== 'concluida');
    document.getElementById('tarefasPendentes').innerText = pendentes.length;
}
