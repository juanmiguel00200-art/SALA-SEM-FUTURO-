<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060608; --card:#0d0d12; --card2:#111118;
  --border:rgba(212,175,55,.14); --gold:#d4af37;
  --gold-light:#f3e5ab; --gold-dark:#8a6800;
  --muted:#5a5a72; --text:#e8e8f0;
  --green:#00ff88; --red:#ff4757; --blue:#3a9cf5; --amber:#f5a623;
  --glow:rgba(212,175,55,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; padding-bottom:100px;
}
.bg-grid{
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(212,175,55,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,175,55,.03) 1px,transparent 1px);
  background-size:48px 48px; z-index:0; pointer-events:none;
}
.page{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:24px 18px;}

/* Header */
.topbar{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:28px; gap:12px; flex-wrap:wrap;
}
.user-chip{
  display:flex; align-items:center; gap:10px;
  background:rgba(212,175,55,.06);
  border:1px solid var(--border);
  padding:8px 16px; border-radius:999px;
  font-family:'Space Mono',monospace; font-size:.72rem;
}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.plan-badge{
  font-family:'Space Mono',monospace; font-size:.7rem; font-weight:700;
  padding:6px 14px; border-radius:999px;
  background:rgba(212,175,55,.08); border:1px solid var(--border);
  color:var(--gold); cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:8px;
}
.plan-badge:hover{border-color:var(--gold); box-shadow:0 0 12px var(--glow);}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.stat{
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:18px;
  animation:fadeUp .5s ease both;
}
.stat:nth-child(2){animation-delay:.05s;}
.stat label{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.stat h2{font-size:2rem;font-weight:800;color:var(--gold);margin-top:6px;}

/* Module cards */
.modules{display:flex;flex-direction:column;gap:18px;}
.mod{
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:24px;
  animation:fadeUp .5s ease .1s both;
  transition:border-color .3s, box-shadow .3s;
}
.mod:hover{border-color:rgba(212,175,55,.3); box-shadow:0 8px 32px rgba(0,0,0,.5);}
.mod-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mod-title{font-size:1.35rem;font-weight:800;}
.badge{
  padding:5px 12px; border-radius:999px;
  font-family:'Space Mono',monospace; font-size:.65rem; font-weight:700;
}
.b-online{background:rgba(0,255,136,.1);color:var(--green);}
.b-beta{background:rgba(212,175,55,.1);color:var(--gold);}
.b-lock{background:rgba(90,90,114,.1);color:var(--muted);}
.mod-desc{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.btn{
  width:100%;padding:15px;border:none;border-radius:14px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;
  cursor:pointer;transition:all .25s;
}
.btn-gold{
  background:linear-gradient(135deg,#f3e5ab,#d4af37,#8a6800);
  color:#080810; box-shadow:0 4px 14px rgba(212,175,55,.25);
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,.4);filter:brightness(1.05);}
.btn-outline{
  background:transparent; border:1px solid var(--border); color:var(--muted);
  margin-top:10px;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold-light);}

/* Tasks quick view */
.tasks-panel{
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:24px; margin-top:18px;
  animation:fadeUp .5s ease .15s both;
}
.panel-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;
}
.panel-title{font-size:1rem;font-weight:800;color:var(--gold-light);}
.panel-count{
  font-family:'Space Mono',monospace;font-size:.7rem;
  background:rgba(212,175,55,.08);border:1px solid var(--border);
  color:var(--gold);padding:4px 10px;border-radius:999px;
}
.task-item{
  display:flex;align-items:center;gap:14px;
  padding:14px; border-radius:14px;
  background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.04);
  margin-bottom:10px; transition:border-color .2s;
}
.task-item:last-child{margin-bottom:0;}
.task-item:hover{border-color:var(--border);}
.task-prio{
  width:4px; border-radius:999px; align-self:stretch; min-height:40px; flex-shrink:0;
}
.prio-high{background:var(--red);}
.prio-normal{background:var(--gold);}
.task-info{flex:1;}
.task-name{font-size:.88rem;font-weight:700;margin-bottom:3px;}
.task-meta{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted);}
.task-status{
  font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;
  padding:4px 10px;border-radius:8px;
}
.s-pending{background:rgba(61,181,255,.08);color:#61b5ff;}
.s-progress{background:rgba(245,166,35,.08);color:var(--amber);}
.s-review{background:rgba(212,175,55,.08);color:var(--gold);}
.s-done{background:rgba(0,255,136,.08);color:var(--green);}
.empty-state{
  text-align:center;padding:28px;
  font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);
}

/* Bottom Nav */
.bottom-nav{
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  width:92%; max-width:480px;
  background:#0b0b10; border:1px solid var(--border);
  border-radius:999px; padding:10px 14px;
  display:flex; justify-content:space-around; z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.nav-btn{
  background:none;border:none;
  font-family:'Space Mono',monospace; font-size:.72rem; font-weight:700;
  color:var(--muted); cursor:pointer; padding:8px 12px; border-radius:999px;
  transition:all .2s; display:flex; align-items:center; gap:6px;
}
.nav-btn:hover,.nav-btn.active{color:var(--gold);background:rgba(212,175,55,.08);}

/* Modal */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;
  padding:20px;z-index:9999;
  backdrop-filter:blur(4px);
}
.modal.open{display:flex;}
.modal-box{
  background:var(--card2);border:1px solid var(--border);
  border-radius:28px;padding:28px;
  width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.modal-title{font-size:1.25rem;font-weight:800;color:var(--gold-light);margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{
  display:block;font-family:'Space Mono',monospace;
  font-size:.65rem;font-weight:700;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;letter-spacing:.05em;
}
.field input,.field textarea,.field select{
  width:100%;padding:14px 16px;border-radius:12px;
  border:1px solid rgba(212,175,55,.12);
  background:rgba(0,0,0,.45);color:white;outline:none;
  font-family:'Space Mono',monospace;font-size:.85rem;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.1);
}
.field textarea{resize:vertical;min-height:90px;}
.field select option{background:#111;}
.btn-sm{
  padding:10px 18px;border:none;border-radius:10px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.82rem;
  cursor:pointer;transition:all .2s;
}
.btn-sm-gold{background:linear-gradient(135deg,#f3e5ab,#d4af37);color:#080810;}
.btn-sm-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-sm-ghost:hover{border-color:var(--gold);color:var(--gold-light);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;}

/* GhostWriter */
.gw-output{
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-radius:14px;padding:16px;
  font-family:'Space Mono',monospace;font-size:.8rem;
  color:var(--gold-light);line-height:1.7;
  min-height:120px;white-space:pre-wrap;
  margin-top:16px;
}
.gw-output.loading{color:var(--muted);font-style:italic;}
.typing-dot{display:inline-block;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

.scrollbar-thin::-webkit-scrollbar{width:4px;}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:rgba(212,175,55,.15);border-radius:999px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="page">
  <!-- TopBar -->
  <div class="topbar">
    <div class="user-chip">
      <div class="user-dot"></div>
      <span id="userLabel">Carregando...</span>
    </div>
    <div class="plan-badge" onclick="abrirPerfil()">
      <span id="planLabel">FREE</span>
      ▾
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <label>Tarefas Pendentes</label>
      <h2 id="statPendentes">0</h2>
    </div>
    <div class="stat">
      <label>Concluídas</label>
      <h2 id="statConcluidas">0</h2>
    </div>
  </div>

  <!-- Modules -->
  <div class="modules">
    <div class="mod">
      <div class="mod-top">
        <span class="mod-title">GhostWriter Pro</span>
        <span class="badge b-beta">BETA</span>
      </div>
      <p class="mod-desc">Geração de conteúdo assistida por IA. Escreva textos, resumos, e-mails e mais com auxílio inteligente.</p>
      <button class="btn btn-gold" onclick="abrirGhostWriter()">✍️ Abrir GhostWriter</button>
    </div>

    <div class="mod">
      <div class="mod-top">
        <span class="mod-title">Solicitar Suporte</span>
        <span class="badge b-online">ONLINE</span>
      </div>
      <p class="mod-desc">Envie uma solicitação para a equipe de suporte. Descreva seu problema e aguarde atendimento.</p>
      <button class="btn btn-gold" onclick="abrirSolicitacao()">📩 Abrir Chamado</button>
    </div>
  </div>

  <!-- Tasks panel -->
  <div class="tasks-panel scrollbar-thin">
    <div class="panel-header">
      <span class="panel-title">📋 Minhas Tarefas</span>
      <span class="panel-count" id="taskCount">0</span>
    </div>
    <div id="tasksList"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="scrollTop()">🏠 Home</button>
  <button class="nav-btn" onclick="abrirTarefas()">📋 Tarefas</button>
  <button class="nav-btn" onclick="abrirPerfil()">⚙️ Perfil</button>
  <button class="nav-btn" onclick="deslogar()">🚪 Sair</button>
</nav>

<!-- Modal container -->
<div class="modal scrollbar-thin" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
// ——— Auth guard ———
const userRA = localStorage.getItem('sala_sem_futuro_ra');
if (!userRA) window.location.href = 'login.html';

document.getElementById('userLabel').textContent = `RA: ${userRA}`;

// ——— Helpers ———
function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
function scrollTop() { window.scrollTo({top:0,behavior:'smooth'}); }
function deslogar() {
  if (confirm('Deseja sair do sistema?')) {
    localStorage.removeItem('sala_sem_futuro_logged');
    window.location.href = 'login.html';
  }
}

// ——— Load tasks ———
function carregarTarefas() {
  const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
  const minhas = tarefas.filter(t => t.responsavel === userRA || t.responsavel === `@${userRA}`);
  const pendentes = minhas.filter(t => !['concluida','entregue'].includes(t.status));
  const concluidas = minhas.filter(t => ['concluida','entregue'].includes(t.status));

  document.getElementById('statPendentes').textContent = pendentes.length;
  document.getElementById('statConcluidas').textContent = concluidas.length;
  document.getElementById('taskCount').textContent = pendentes.length;

  const list = document.getElementById('tasksList');
  if (pendentes.length === 0) {
    list.innerHTML = `<div class="empty-state">// Nenhuma tarefa pendente atribuída</div>`;
    return;
  }
  list.innerHTML = pendentes.map(t => {
    const statusMap = {
      pendente: ['s-pending','EM FILA'],
      em_progresso: ['s-progress','EM PROGRESSO'],
      aguardando_revisao: ['s-review','REVISÃO'],
      inconclusivo: ['s-progress','INCONCLUSIVO'],
      ajuda: ['s-pending','PRECISA DE AJUDA'],
    };
    const [sc, sl] = statusMap[t.status] || ['s-pending','EM FILA'];
    return `<div class="task-item">
      <div class="task-prio ${t.prioridade==='high'?'prio-high':'prio-normal'}"></div>
      <div class="task-info">
        <div class="task-name">${t.titulo}</div>
        <div class="task-meta">#${t.id} • ${new Date(t.data_criacao).toLocaleDateString('pt-BR')}</div>
      </div>
      <div class="task-status ${sc}">${sl}</div>
    </div>`;
  }).join('');
}

// ——— GhostWriter ———
function abrirGhostWriter() {
  openModal(`
    <div class="modal-title">✍️ GhostWriter Pro</div>
    <div class="field">
      <label>Tipo de conteúdo</label>
      <select id="gwTipo">
        <option value="texto">Texto livre</option>
        <option value="email">E-mail</option>
        <option value="resumo">Resumo</option>
        <option value="lista">Lista de ideias</option>
      </select>
    </div>
    <div class="field">
      <label>Descreva o que quer gerar</label>
      <textarea id="gwPrompt" placeholder="Ex: Escreva um e-mail formal pedindo prorrogação de prazo..."></textarea>
    </div>
    <div id="gwOutput" class="gw-output" style="display:none;"></div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="gerarConteudo()">✨ Gerar</button>
      <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

function gerarConteudo() {
  const tipo = document.getElementById('gwTipo').value;
  const prompt = document.getElementById('gwPrompt').value.trim();
  if (!prompt) { alert('Descreva o que quer gerar!'); return; }
  const out = document.getElementById('gwOutput');
  out.style.display = 'block';
  out.className = 'gw-output loading';
  out.innerHTML = `Gerando conteúdo<span class="typing-dot">...</span>`;

  // Simulação de geração (substitua por chamada real de API se desejar)
  const templates = {
    email: `Assunto: [Título do e-mail]\n\nPrezado(a),\n\nEspero que este e-mail o(a) encontre bem.\n\n${prompt}\n\nAguardo retorno.\n\nAtenciosamente,\n[Seu nome]`,
    resumo: `📋 RESUMO\n\n${prompt}\n\n• Ponto principal 1\n• Ponto principal 2\n• Conclusão`,
    lista: `💡 IDEIAS GERADAS\n\n1. Primeira ideia baseada em: ${prompt}\n2. Segunda abordagem alternativa\n3. Terceira perspectiva\n4. Variação criativa\n5. Opção adicional`,
    texto: `${prompt}\n\n[Conteúdo gerado com base no tema solicitado. Edite conforme necessário para personalizar.]`,
  };

  setTimeout(() => {
    out.className = 'gw-output';
    out.textContent = templates[tipo] || templates.texto;
  }, 1200);
}

// ——— Suporte ———
function abrirSolicitacao() {
  openModal(`
    <div class="modal-title">📩 Abrir Chamado de Suporte</div>
    <div class="field">
      <label>Título do problema</label>
      <input type="text" id="solTitulo" placeholder="Ex: Erro ao acessar módulo">
    </div>
    <div class="field">
      <label>Descrição detalhada</label>
      <textarea id="solDesc" placeholder="Descreva o que aconteceu, quando e como reproduzir..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="enviarSolicitacao()">📤 Enviar</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function enviarSolicitacao() {
  const titulo = document.getElementById('solTitulo').value.trim();
  const desc = document.getElementById('solDesc').value.trim();
  if (!titulo || !desc) { alert('Preencha todos os campos!'); return; }
  const lista = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas_alunos') || '[]');
  lista.unshift({
    id: Date.now(),
    aluno: userRA,
    titulo,
    descricao: desc,
    status: 'pendente',
    data: new Date().toISOString(),
  });
  localStorage.setItem('sala_sem_futuro_tarefas_alunos', JSON.stringify(lista));
  closeModal();
  alert('✅ Chamado enviado! A equipe irá verificar em breve.');
}

// ——— Tarefas modal ———
function abrirTarefas() {
  const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
  const minhas = tarefas.filter(t => t.responsavel === userRA || t.responsavel === `@${userRA}`);
  const statusLabel = {
    pendente:'🔵 Em Fila', em_progresso:'⚡ Em Progresso',
    aguardando_revisao:'⏳ Revisão', concluida:'✅ Concluída',
    inconclusivo:'⚠️ Inconclusivo', ajuda:'🆘 Ajuda',
  };
  openModal(`
    <div class="modal-title">📋 Todas as Minhas Tarefas</div>
    ${minhas.length === 0
      ? `<div class="empty-state">// Nenhuma tarefa atribuída</div>`
      : minhas.map(t => `
        <div class="task-item" style="margin-bottom:10px;">
          <div class="task-prio ${t.prioridade==='high'?'prio-high':'prio-normal'}"></div>
          <div class="task-info">
            <div class="task-name">${t.titulo}</div>
            <div class="task-meta">${t.descricao.slice(0,60)}...</div>
            <div class="task-meta" style="margin-top:4px;">${statusLabel[t.status]||t.status}</div>
          </div>
        </div>`).join('')}
    <button class="btn btn-outline" onclick="closeModal()" style="margin-top:16px;">Fechar</button>
  `);
}

// ——— Perfil ———
function abrirPerfil() {
  const loginTime = localStorage.getItem('sala_sem_futuro_login_time');
  openModal(`
    <div class="modal-title">👤 Perfil</div>
    <div style="background:rgba(0,0,0,.3);border-radius:14px;padding:18px;font-family:'Space Mono',monospace;font-size:.78rem;line-height:2;">
      <div>🔑 RA: <strong style="color:var(--gold-light)">${userRA}</strong></div>
      <div>📅 Login: <strong>${loginTime ? new Date(loginTime).toLocaleString('pt-BR') : 'N/A'}</strong></div>
      <div>📦 Plano: <strong>FREE</strong></div>
    </div>
    <button class="btn btn-outline" onclick="closeModal()" style="margin-top:16px;">Fechar</button>
  `);
}

// ——— Init ———
carregarTarefas();
setInterval(carregarTarefas, 6000);
</script>
</body>
</html>
