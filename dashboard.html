<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS — Neural Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050507;
  --card: rgba(13,13,18,0.95);
  --card2: rgba(17,17,24,0.98);
  --border: rgba(212,175,55,0.18);
  --gold: #d4af37;
  --gold-light: #f3e5ab;
  --glow: 0 0 25px rgba(212,175,55,0.35);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: #e8e8f0;
  min-height: 100vh;
  overflow-x: hidden;
  background-image: 
    radial-gradient(circle at 50% 15%, rgba(212,175,55,0.06) 0%, transparent 60%),
    linear-gradient(180deg, #0a0a0f 0%, #050507 100%);
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  z-index: 0;
  pointer-events: none;
  animation: gridMove 40s linear infinite;
}

@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }

.page { position:relative; z-index:2; max-width:540px; margin:0 auto; padding:24px 20px; }

/* Header Futurista */
.topbar {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:36px; padding:12px 20px;
  background: rgba(10,10,15,0.6);
  border: 1px solid var(--border);
  border-radius: 999px;
  backdrop-filter: blur(12px);
}

.user-chip {
  display:flex; align-items:center; gap:10px;
  font-family:'Space Mono',monospace; font-size:0.78rem;
  padding:8px 16px; border-radius:999px;
  background:rgba(212,175,55,0.08);
  border:1px solid var(--border);
}

.plan-badge {
  padding:8px 20px; border-radius:999px;
  font-size:0.72rem; font-weight:700; letter-spacing:0.5px;
  cursor:pointer; transition:all 0.3s;
  border:1px solid var(--border);
}
.plan-free { background:rgba(90,90,114,0.2); color:#aaa; }
.plan-premium { 
  background:linear-gradient(90deg,#d4af37,#f3e5ab); 
  color:#0a0a10; 
  box-shadow: var(--glow); 
  animation: premiumPulse 3s infinite alternate;
}

@keyframes premiumPulse { from { box-shadow: 0 0 15px #d4af37; } to { box-shadow: 0 0 30px #f3e5ab; } }

/* Stats */
.stats {
  display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:32px;
}
.stat {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:22px;
  transition:all 0.4s ease;
  position:relative;
  overflow:hidden;
}
.stat::before {
  content:''; position:absolute; top:-50%; left:-50%; width:80px; height:80px;
  background:radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
  opacity:0; transition:0.4s;
}
.stat:hover::before { opacity:1; transform:scale(1.8); }
.stat h2 { font-size:2.6rem; font-weight:900; color:var(--gold-light); margin-top:8px; }

/* Modules */
.mod {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:28px;
  padding:28px;
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
  position:relative;
}
.mod:hover {
  transform: translateY(-8px);
  border-color: var(--gold);
  box-shadow: var(--glow);
}
.mod.premium::after {
  content:'PREMIUM'; position:absolute; top:16px; right:16px;
  font-size:0.65rem; background:#d4af37; color:#0a0a10;
  padding:4px 12px; border-radius:999px; font-weight:900;
}

.btn {
  width:100%; padding:17px; border:none; border-radius:18px;
  font-weight:800; font-size:1.02rem; cursor:pointer;
  transition:all 0.3s;
  margin-top:12px;
}
.btn-gold {
  background: linear-gradient(135deg, #f3e5ab, #d4af37, #b38b1e);
  color:#0a0a10;
  box-shadow: 0 8px 25px rgba(212,175,55,0.4);
}
.btn-gold:hover { transform:translateY(-4px); box-shadow:0 15px 35px rgba(212,175,55,0.6); }

/* Modal Ultra Premium */
.modal {
  position:fixed; inset:0; background:rgba(5,5,7,0.95);
  display:none; align-items:center; justify-content:center;
  z-index:9999; backdrop-filter:blur(12px);
}
.modal.open { display:flex; }
.modal-box {
  background:var(--card2); border:1px solid var(--border);
  border-radius:32px; padding:36px; width:100%; max-width:560px;
  box-shadow: 0 0 60px rgba(212,175,55,0.25);
  animation: modalPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalPop { from { opacity:0; transform:scale(0.85) translateY(40px); } }

/* Bottom Nav */
.bottom-nav {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  width:94%; max-width:500px;
  background:rgba(11,11,16,0.95); border:1px solid var(--border);
  border-radius:999px; padding:14px 18px;
  display:flex; justify-content:space-around;
  box-shadow:0 15px 40px rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="page">
  <div class="topbar">
    <div class="user-chip">
      <span style="color:#00ff88;">●</span>
      <span id="userLabel">RA: 000000</span>
    </div>
    <div id="planBadge" class="plan-badge" onclick="abrirPerfil()"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <label style="font-family:Space Mono; font-size:0.7rem; opacity:0.7;">PENDENTES</label>
      <h2 id="statPendentes">0</h2>
    </div>
    <div class="stat">
      <label style="font-family:Space Mono; font-size:0.7rem; opacity:0.7;">CONCLUÍDAS</label>
      <h2 id="statConcluidas">0</h2>
    </div>
  </div>

  <div class="modules" id="modulesContainer"></div>

  <div class="tasks-panel" style="background:var(--card);border:1px solid var(--border);border-radius:28px;padding:28px;margin-top:28px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <span style="font-size:1.2rem;font-weight:800;color:var(--gold-light);">Minhas Tarefas</span>
      <span id="taskCount" style="background:rgba(212,175,55,0.15);padding:6px 16px;border-radius:999px;font-size:0.75rem;"></span>
    </div>
    <div id="tasksList"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="scrollTop()">🏠</button>
  <button class="nav-btn" onclick="abrirTarefas()">📋</button>
  <button class="nav-btn" onclick="abrirPerfil()">👤</button>
  <button class="nav-btn" onclick="deslogar()">🚪</button>
</nav>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
// ==================== CONFIG ====================
const userRA = localStorage.getItem('sala_sem_futuro_ra') || "RA00001";
let plano = localStorage.getItem('sala_sem_futuro_plano') || "FREE";
let nivelIngles = localStorage.getItem('nivel_ingles') || "A2";

document.getElementById('userLabel').textContent = `RA: ${userRA}`;

// ==================== RENDER PLAN ====================
function renderPlan() {
  const badge = document.getElementById('planBadge');
  if (plano === "PREMIUM") {
    badge.className = "plan-badge plan-premium";
    badge.innerHTML = `PREMIUM <span style="font-size:1.1em;">★</span>`;
  } else {
    badge.className = "plan-badge plan-free";
    badge.innerHTML = `FREE <span onclick="sugerirUpgrade(event)" style="margin-left:8px;text-decoration:underline;font-size:0.7em;">Upgrade</span>`;
  }
}

// ==================== MODULES ====================
function renderModules() {
  const container = document.getElementById('modulesContainer');
  let html = '';

  // GhostWriter
  html += `
    <div class="mod">
      <h3 style="font-size:1.5rem;margin-bottom:12px;color:var(--gold-light);">GhostWriter ${plano === "PREMIUM" ? "Neural" : "Pro"}</h3>
      <p style="opacity:0.75;line-height:1.6;margin-bottom:20px;">Geração de textos adaptados ao seu nível de inglês com IA avançada.</p>
      <button class="btn btn-gold" onclick="abrirGhostWriter()">✍️ ABRIR GHOSTWRITER</button>
    </div>`;

  // Suporte / Tarefas
  html += `
    <div class="mod">
      <h3 style="font-size:1.5rem;margin-bottom:12px;color:var(--gold-light);">Enviar Tarefa</h3>
      <p style="opacity:0.75;line-height:1.6;margin-bottom:20px;">Nossa equipe revisa e entrega com excelência.</p>
      <button class="btn btn-gold" onclick="abrirSolicitacao()">📨 ENVIAR TAREFA</button>
    </div>`;

  if (plano === "PREMIUM") {
    html += `
      <div class="mod premium">
        <h3 style="font-size:1.5rem;margin-bottom:12px;color:#ffd700;">Advanced Translator</h3>
        <p style="opacity:0.8;margin-bottom:20px;">Tradução simultânea + correção gramatical avançada.</p>
        <button class="btn btn-gold" onclick="alert('Módulo Advanced Translator em breve...')">🌐 ABRIR TRADUTOR</button>
      </div>`;
  }

  container.innerHTML = html;
}

// ==================== GHOSTWRITER ====================
function abrirGhostWriter() {
  openModal(`
    <h2 style="color:var(--gold-light);margin-bottom:8px;">GhostWriter ${plano === "PREMIUM" ? "Neural v2" : "Pro"}</h2>
    <p style="color:#aaa;margin-bottom:24px;">Nível atual: <strong>${nivelIngles}</strong></p>
    
    <select id="nivelSelect" style="width:100%;padding:14px;border-radius:12px;background:#1a1a22;border:1px solid var(--border);margin-bottom:20px;color:white;">
      <option value="A1" ${nivelIngles==='A1'?'selected':''}>A1 - Iniciante</option>
      <option value="A2" ${nivelIngles==='A2'?'selected':''}>A2 - Básico</option>
      <option value="B1" ${nivelIngles==='B1'?'selected':''}>B1 - Intermediário</option>
      <option value="B2" ${nivelIngles==='B2'?'selected':''}>B2 - Avançado</option>
      <option value="C1" ${nivelIngles==='C1'?'selected':''}>C1 - Fluente</option>
    </select>

    <textarea id="gwPrompt" placeholder="Descreva o que deseja gerar (ex: e-mail formal para professor...)" style="width:100%;height:160px;padding:18px;border-radius:16px;background:#1a1a22;border:1px solid var(--border);color:white;resize:vertical;"></textarea>
    
    <div id="gwOutput" style="display:none;margin:24px 0;padding:20px;background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:16px;min-height:160px;white-space:pre-wrap;"></div>

    <button class="btn btn-gold" onclick="gerarConteudo()">✨ GERAR CONTEÚDO</button>
  `);
}

function gerarConteudo() {
  const prompt = document.getElementById('gwPrompt').value.trim();
  const nivel = document.getElementById('nivelSelect').value;
  const output = document.getElementById('gwOutput');

  if (!prompt) return alert("Escreva sua solicitação.");

  output.style.display = 'block';
  output.innerHTML = `<em>Processando com IA ${plano === "PREMIUM" ? "Neural" : ""}...</em>`;

  setTimeout(() => {
    output.innerHTML = `✅ Conteúdo gerado com sucesso (Nível ${nivel})\n\n${prompt}\n\n──────────────────\nAdaptado automaticamente ao seu nível de inglês.\n${plano === "PREMIUM" ? "Revisão avançada aplicada." : "Enviado para revisão humana pela equipe."}`;
  }, 1350);
}

// ==================== OUTRAS FUNÇÕES ====================
function abrirSolicitacao() {
  openModal(`
    <h2 style="color:var(--gold-light)">Enviar Tarefa para Equipe</h2>
    <input id="solTitulo" placeholder="Título da tarefa" style="width:100%;padding:16px;margin:16px 0;border-radius:12px;background:#1a1a22;border:1px solid var(--border);color:white;">
    <textarea id="solDesc" placeholder="Descreva sua tarefa ou dúvida..." style="width:100%;height:180px;padding:16px;border-radius:12px;background:#1a1a22;border:1px solid var(--border);color:white;"></textarea>
    <button class="btn btn-gold" style="margin-top:20px;" onclick="enviarSolicitacao()">ENVIAR PARA EQUIPE</button>
  `);
}

function enviarSolicitacao() {
  const titulo = document.getElementById('solTitulo').value.trim();
  const desc = document.getElementById('solDesc').value.trim();
  if (!titulo || !desc) return alert("Preencha todos os campos.");

  let tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas_alunos') || '[]');
  tarefas.unshift({ id: Date.now(), aluno: userRA, titulo, descricao: desc, nivel: nivelIngles, status: 'pendente', data: new Date().toISOString() });
  localStorage.setItem('sala_sem_futuro_tarefas_alunos', JSON.stringify(tarefas));

  closeModal();
  alert('✅ Tarefa enviada com sucesso para a equipe!');
  carregarTarefas();
}

function abrirPerfil() {
  const novoNivel = prompt("Digite seu nível de inglês (A1, A2, B1, B2, C1):", nivelIngles);
  if (novoNivel) {
    nivelIngles = novoNivel.toUpperCase();
    localStorage.setItem('nivel_ingles', nivelIngles);
    alert(`Nível atualizado para ${nivelIngles}`);
  }
}

function sugerirUpgrade(e) {
  e.stopImmediatePropagation();
  if (confirm("Deseja fazer upgrade para PREMIUM?\n\n• GhostWriter Neural\n• Tradutor Avançado\n• Suporte Prioritário")) {
    plano = "PREMIUM";
    localStorage.setItem('sala_sem_futuro_plano', "PREMIUM");
    renderPlan();
    renderModules();
    alert("✅ Upgrade realizado com sucesso! (Simulação)");
  }
}

// ==================== HELPERS ====================
function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function scrollTop() { window.scrollTo({top:0, behavior:'smooth'}); }
function deslogar() {
  if (confirm("Deseja sair do sistema?")) {
    localStorage.clear();
    window.location.href = "login.html";
  }
}

// ==================== TASKS ====================
function carregarTarefas() {
  const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas_alunos') || '[]');
  const minhas = tarefas.filter(t => t.aluno === userRA);
  
  document.getElementById('statPendentes').textContent = minhas.filter(t => t.status === 'pendente').length;
  document.getElementById('statConcluidas').textContent = minhas.filter(t => t.status !== 'pendente').length;
  document.getElementById('taskCount').textContent = minhas.length;
}

function abrirTarefas() {
  // Implementação similar à anterior, omitida por brevidade
  alert("📋 Todas as tarefas carregadas (implemente conforme necessidade)");
}

// ==================== INIT ====================
renderPlan();
renderModules();
carregarTarefas();
setInterval(carregarTarefas, 7000);
</script>
</body>
</html>
