<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS — Equipe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --bg:#050507; --card:rgba(13,13,18,0.95); --gold:#d4af37; --border:rgba(212,175,55,0.18); }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Syne',sans-serif; background:var(--bg); color:#e8e8f0;
  min-height:100vh;
}
.page { max-width:980px; margin:0 auto; padding:30px; }

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:28px; margin-bottom:28px;
}
</style>
</head>
<body>
<div class="page">
  <h1 style="color:var(--gold);margin-bottom:30px;">👥 Equipe Sala sem Futuro</h1>

  <div class="card">
    <h2>Tarefas em Andamento</h2>
    <div id="equipeList"></div>
  </div>

  <button onclick="window.location.href='admin.html'" style="padding:14px 32px;background:var(--gold);color:#0a0a10;border:none;border-radius:999px;font-weight:800;">Ir para Painel Admin</button>
</div>

<script>
const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas_alunos') || '[]');

document.getElementById('equipeList').innerHTML = tarefas.length === 0 
  ? "<p style='opacity:0.6'>Nenhuma tarefa pendente no momento.</p>"
  : tarefas.map(t => `
    <div style="padding:16px;border:1px solid var(--border);border-radius:16px;margin-bottom:12px;">
      <strong>${t.titulo}</strong> — <span style="color:#aaa">${t.aluno} (${t.nivel})</span>
    </div>
  `).join('');
</script>
</body>
</html>
