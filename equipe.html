<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS - Painel da Equipe</title>
<style>
:root {
    --bg: #09090d;
    --card: #111118;
    --border: rgba(212, 175, 55, 0.12);
    --primary: #d4af37;
    --secondary: #f3e5ab;
    --gold-glow: rgba(212, 175, 55, 0.35);
    --text: #ffffff;
    --muted: #9fa0a6;
    --red: #e74c3c;
    --orange: #ff9f43;
    --green: #00ff88;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('https://i.postimg.cc/gky5YNH2/1778823817951-3.jpg') center/cover no-repeat;
    opacity: .02;
    z-index: -2;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(5,5,8,0.85), rgba(5,5,8,0.98));
    z-index: -1;
}

.container { max-width: 600px; margin: 0 auto; }

.equipe-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}

.equipe-header h1 { font-size: 1.8rem; font-weight: 800; }
.equipe-header h1 span { 
    background: linear-gradient(135deg, #ffe066, #d4af37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.user-badge {
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--primary);
    color: var(--secondary);
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.85rem;
}

.panel-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.6);
}

.panel-box h3 {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.task-board { display: flex; flex-direction: column; gap: 14px; }
.task-card {
    background: rgba(0,0,0,0.4);
    border-left: 4px solid var(--primary);
    padding: 18px;
    border-radius: 0 16px 16px 0;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s ease;
}
.task-card.high { border-left-color: var(--red); }
.task-card.review { border-left-color: var(--orange); background: rgba(255, 159, 67, 0.02); }
.task-card.done { border-left-color: #333; opacity: 0.4; }

.task-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.task-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
.task-desc { font-size: 0.85rem; color: #b9bbbe; line-height: 1.4; margin-bottom: 14px; }
.task-footer { display: flex; justify-content: space-between; align-items: center; }

.badge-status {
    font-size: 0.75rem;
    font-weight: 800;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 8px;
    transition: 0.2s;
}
.badge-status:hover:not(:disabled) { background: rgba(212, 175, 55, 0.1); border-color: var(--primary); }
.badge-status:disabled { cursor: not-allowed; opacity: 0.7; }

.btn-back {
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--border);
    color: var(--primary);
    padding: 8px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    text-decoration: none;
    font-size: 0.85rem;
    transition: 0.3s;
}
.btn-back:hover { color: white; border-color: var(--primary); box-shadow: 0 0 12px var(--gold-glow); }
</style>
</head>
<body>

<div class="container">
    <header class="equipe-header">
        <div>
            <h1>Painel de <span>Tarefas</span></h1>
        </div>
        <div>
            <span class="user-badge" id="nomeLogado">CARREGANDO...</span>
            <a href="dashboard.html" class="btn-back" style="margin-left: 12px;">← Dashboard</a>
        </div>
    </header>

    <div class="panel-box">
        <h3>📥 Suas Diretrizes Designadas</h3>
        <div class="task-board" id="quadroOperador">
            <div style="text-align:center; color:#8e8ea0;">Carregando tarefas...</div>
        </div>
    </div>
</div>

<script>
const userRA = localStorage.getItem('sala_sem_futuro_ra');
if (!userRA) {
    window.location.href = 'login.html';
}

document.getElementById('nomeLogado').innerText = `👤 ${userRA.slice(0,15)}`;

function carregarTarefasDoOperador() {
    const quadro = document.getElementById('quadroOperador');
    const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    
    // Filtrar tarefas atribuídas ao operador atual
    const tarefasFiltradas = tarefas.filter(t => t.responsavel === userRA || t.responsavel === userRA.split('@')[0]);
    
    if (tarefasFiltradas.length === 0) {
        quadro.innerHTML = `<p style="color: var(--muted); text-align: center; font-size: 0.9rem;">Nenhuma tarefa pendente para o seu setor.</p>`;
        return;
    }

    quadro.innerHTML = '';
    tarefasFiltradas.forEach(tarefa => {
        const card = document.createElement('div');
        card.className = tarefa.prioridade === 'high' ? 'task-card high' : 'task-card';
        if (tarefa.status === 'aguardando_revisao') card.classList.add('review');
        if (tarefa.status === 'concluida') card.classList.add('done');
        
        let statusText = '🔵 EM FILA';
        let statusColor = '#61b5ff';
        if (tarefa.status === 'em_progresso') { statusText = '⚡ EM PROGRESSO'; statusColor = '#ffcc00'; }
        if (tarefa.status === 'aguardando_revisao') { statusText = '⏳ AGUARDANDO REVISÃO'; statusColor = '#ff9f43'; }
        if (tarefa.status === 'concluida') { statusText = '🏆 CONCLUÍDO'; statusColor = '#d4af37'; }
        
        card.innerHTML = `
            <div class="task-header">
                <span>ID: #${tarefa.id}</span>
                <span style="color: ${tarefa.prioridade === 'high' ? 'var(--red)' : 'var(--muted)'};">
                    ${tarefa.prioridade === 'high' ? 'CRÍTICO' : 'REGULAR'}
                </span>
            </div>
            <div class="task-title">${tarefa.titulo}</div>
            <div class="task-desc">${tarefa.descricao}</div>
            <div class="task-footer">
                <span style="font-size:0.7rem; color:#666;">Criado por: ${tarefa.criador || 'Admin'}</span>
                <button class="badge-status" style="color: ${statusColor};" onclick="avancarStatus(this, '${tarefa.id}')" ${tarefa.status === 'concluida' ? 'disabled' : ''}>${statusText}</button>
            </div>
        `;
        quadro.appendChild(card);
    });
}

async function avancarStatus(botao, tarefaId) {
    const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    const tarefaIndex = tarefas.findIndex(t => t.id == tarefaId);
    
    if (tarefaIndex === -1) return;
    
    if (botao.innerText === "🔵 EM FILA") {
        tarefas[tarefaIndex].status = 'em_progresso';
        botao.innerText = "⚡ EM PROGRESSO";
        botao.style.color = "#ffcc00";
    } 
    else if (botao.innerText === "⚡ EM PROGRESSO") {
        if (!confirm("Deseja enviar esta tarefa para a aprovação do Admin?")) return;
        
        tarefas[tarefaIndex].status = 'aguardando_revisao';
        botao.innerText = "⏳ AGUARDANDO REVISÃO";
        botao.style.color = "#ff9f43";
        botao.disabled = true;
        
        // Notificar Admin (via localStorage)
        localStorage.setItem('sala_sem_futuro_notificacao', JSON.stringify({
            tipo: 'tarefa_aguardando',
            tarefaId: tarefaId,
            tarefaTitulo: tarefas[tarefaIndex].titulo,
            operador: userRA,
            timestamp: new Date().toISOString()
        }));
        
        botao.closest('.task-card').classList.add('review');
    }
    
    localStorage.setItem('sala_sem_futuro_tarefas', JSON.stringify(tarefas));
    carregarTarefasDoOperador();
}

// Atualizar a cada 5 segundos
carregarTarefasDoOperador();
setInterval(carregarTarefasDoOperador, 5000);
</script>
</body>
</html>
