<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS - Equipe</title>
<style>
:root {
    --bg: #09090d;
    --card: #111118;
    --border: rgba(212, 175, 55, 0.12);
    --primary: #d4af37;
    --secondary: #f3e5ab;
    --gold-glow: rgba(212, 175, 55, 0.35);
    --text: #ffffff;
    --muted: #9fa0a6;
    --red: #e74c3c;
    --orange: #ff9f43;
    --green: #00ff88;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('https://i.postimg.cc/gky5YNH2/1778823817951-3.jpg') center/cover no-repeat;
    opacity: .02;
    z-index: -2;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(5,5,8,0.85), rgba(5,5,8,0.98));
    z-index: -1;
}

.container { max-width: 600px; margin: 0 auto; }

.login-container { max-width: 400px; margin: 80px auto 0; }
.login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    text-align: center;
}
.login-box h2 { color: var(--primary); margin-bottom: 24px; }
.login-box input {
    width: 100%;
    padding: 14px;
    margin-bottom: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,.5);
    color: white;
    outline: none;
}
.login-box input:focus { border-color: var(--primary); }
.btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f3e5ab, #d4af37);
    border: none;
    border-radius: 12px;
    font-weight: 800;
    cursor: pointer;
}
.btn-login:hover { filter: brightness(1.05); }

.painel-principal { display: none; }

.equipe-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 15px;
}
.equipe-header h1 { font-size: 1.8rem; font-weight: 800; }
.equipe-header h1 span { background: linear-gradient(135deg, #ffe066, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.user-badge {
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--primary);
    color: var(--secondary);
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.85rem;
}

.panel-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.6);
}
.panel-box h3 {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--secondary);
    text-transform: uppercase;
}

.task-board { display: flex; flex-direction: column; gap: 14px; max-height: 500px; overflow-y: auto; }
.task-card {
    background: rgba(0,0,0,0.4);
    border-left: 4px solid var(--primary);
    padding: 18px;
    border-radius: 0 16px 16px 0;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
}
.task-card.high { border-left-color: var(--red); }
.task-card.review { border-left-color: var(--orange); background: rgba(255,159,67,0.02); }
.task-card.done { border-left-color: #333; opacity: 0.4; }

.task-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.task-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.task-desc { font-size: 0.8rem; color: #b9bbbe; line-height: 1.4; margin-bottom: 14px; }
.task-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

.badge-status {
    font-size: 0.75rem;
    font-weight: 800;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 8px;
}
.badge-status:hover:not(:disabled) { background: rgba(212,175,55,0.1); border-color: var(--primary); }
.badge-status:disabled { cursor: not-allowed; opacity: 0.7; }

.btn-back {
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--border);
    color: var(--primary);
    padding: 8px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    text-decoration: none;
    font-size: 0.85rem;
}
.btn-back:hover { color: white; border-color: var(--primary); box-shadow: 0 0 12px var(--gold-glow); }

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.95);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 9999;
}
.modal-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    max-width: 400px;
    width: 100%;
    text-align: center;
}
.modal-box input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,.5);
    color: white;
}
</style>
</head>
<body>

<div id="loginScreen" class="container login-container">
    <div class="login-box">
        <h2>🔐 Acesso da Equipe</h2>
        <input type="text" id="loginChave" placeholder="Sua Chave de Identificação (ex: @joao)">
        <input type="password" id="loginSenha" placeholder="Sua senha">
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        <p style="color: #666; font-size: 0.7rem; margin-top: 20px;">Use a chave e senha fornecidas pelo Admin</p>
    </div>
</div>

<div id="modalTrocaSenha" class="modal">
    <div class="modal-box">
        <h3 style="color: var(--primary);">🔒 Trocar Senha</h3>
        <p style="color: #8e8ea0; margin-bottom: 15px;">Esta é sua primeira vez acessando. Crie uma nova senha:</p>
        <input type="password" id="novaSenha" placeholder="Nova senha">
        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
        <button class="btn-login" onclick="trocarSenha()">Salvar nova senha</button>
    </div>
</div>

<div id="painelPrincipal" class="container painel-principal">
    <header class="equipe-header">
        <div><h1>Painel de <span>Tarefas</span></h1></div>
        <div>
            <span class="user-badge" id="nomeLogado">CARREGANDO...</span>
            <button class="btn-back" onclick="logout()" style="margin-left: 12px;">🚪 Sair</button>
            <a href="dashboard.html" class="btn-back" style="margin-left: 8px;">← Dashboard</a>
        </div>
    </header>
    <div class="panel-box">
        <h3>📥 Minhas Tarefas</h3>
        <div class="task-board" id="quadroOperador"><div style="text-align:center; color:#8e8ea0;">Carregando tarefas...</div></div>
    </div>
    <div class="panel-box" style="margin-top: 20px;">
        <h3>ℹ️ Minhas Informações</h3>
        <div id="infoUsuario" style="color: #8e8ea0; font-size: 0.85rem;"></div>
    </div>
</div>

<script>
let usuarioLogado = null;
let equipe = [];

function carregarEquipe() { equipe = JSON.parse(localStorage.getItem('sala_sem_futuro_equipe') || '[]'); }

function fazerLogin() {
    const chave = document.getElementById('loginChave').value.trim();
    const senha = document.getElementById('loginSenha').value;
    carregarEquipe();
    const usuario = equipe.find(m => m.chave === chave);
    if (!usuario) { alert('Chave não encontrada!'); return; }
    if (usuario.senha !== senha) { alert('Senha incorreta!'); return; }
    usuarioLogado = usuario;
    localStorage.setItem('sala_sem_futuro_equipe_logged', JSON.stringify({ chave: usuario.chave, nome: usuario.nome }));
    if (usuario.senhaTemporaria) { document.getElementById('modalTrocaSenha').style.display = 'flex'; }
    else { entrarNoPainel(); }
}

function trocarSenha() {
    const novaSenha = document.getElementById('novaSenha').value;
    const confirmar = document.getElementById('confirmarSenha').value;
    if (novaSenha.length < 4) { alert('A senha deve ter no mínimo 4 caracteres!'); return; }
    if (novaSenha !== confirmar) { alert('As senhas não coincidem!'); return; }
    const index = equipe.findIndex(m => m.chave === usuarioLogado.chave);
    if (index !== -1) {
        equipe[index].senha = novaSenha;
        equipe[index].senhaTemporaria = false;
        localStorage.setItem('sala_sem_futuro_equipe', JSON.stringify(equipe));
        usuarioLogado.senha = novaSenha;
        usuarioLogado.senhaTemporaria = false;
    }
    document.getElementById('modalTrocaSenha').style.display = 'none';
    entrarNoPainel();
}

function entrarNoPainel() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('painelPrincipal').style.display = 'block';
    document.getElementById('nomeLogado').innerHTML = `👤 ${usuarioLogado.nome} | ${usuarioLogado.cargo}`;
    document.getElementById('infoUsuario').innerHTML = `
        <p><strong>Nome:</strong> ${usuarioLogado.nome}</p>
        <p><strong>Chave:</strong> ${usuarioLogado.chave}</p>
        <p><strong>Cargo:</strong> ${usuarioLogado.cargo}</p>
        <p><strong>Entrou em:</strong> ${new Date(usuarioLogado.dataCriacao).toLocaleDateString()}</p>
    `;
    carregarTarefasDoOperador();
    setInterval(carregarTarefasDoOperador, 5000);
}

function carregarTarefasDoOperador() {
    if (!usuarioLogado) return;
    const quadro = document.getElementById('quadroOperador');
    const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    const minhasTarefas = tarefas.filter(t => t.responsavel === usuarioLogado.chave);
    if (minhasTarefas.length === 0) {
        quadro.innerHTML = '<p style="color: var(--muted); text-align: center;">Nenhuma tarefa atribuída.</p>';
        return;
    }
    quadro.innerHTML = '';
    minhasTarefas.forEach(tarefa => {
        const card = document.createElement('div');
        card.className = tarefa.prioridade === 'high' ? 'task-card high' : 'task-card';
        if (tarefa.status === 'aguardando_revisao') card.classList.add('review');
        if (tarefa.status === 'concluida') card.classList.add('done');
        let statusText = '🔵 EM FILA', statusColor = '#61b5ff';
        if (tarefa.status === 'em_progresso') { statusText = '⚡ EM PROGRESSO'; statusColor = '#ffcc00'; }
        if (tarefa.status === 'aguardando_revisao') { statusText = '⏳ AGUARDANDO REVISÃO'; statusColor = '#ff9f43'; }
        if (tarefa.status === 'concluida') { statusText = '🏆 CONCLUÍDO'; statusColor = '#d4af37'; }
        card.innerHTML = `
            <div class="task-header"><span>ID: #${tarefa.id}</span><span>${tarefa.prioridade === 'high' ? '⚠️ CRÍTICO' : '📌 REGULAR'}</span></div>
            <div class="task-title">${tarefa.titulo}</div>
            <div class="task-desc">${tarefa.descricao}</div>
            <div class="task-footer">
                <span style="font-size:0.7rem;">Criado por: ${tarefa.criador} • ${new Date(tarefa.data_criacao).toLocaleDateString()}</span>
                <button class="badge-status" style="color: ${statusColor};" onclick="avancarStatus(this, '${tarefa.id}')" ${tarefa.status === 'concluida' ? 'disabled' : ''}>${statusText}</button>
            </div>
        `;
        quadro.appendChild(card);
    });
}

async function avancarStatus(botao, tarefaId) {
    const tarefas = JSON.parse(localStorage.getItem('sala_sem_futuro_tarefas') || '[]');
    const tarefaIndex = tarefas.findIndex(t => t.id == tarefaId);
    if (tarefaIndex === -1) return;
    if (botao.innerText === "🔵 EM FILA") {
        tarefas[tarefaIndex].status = 'em_progresso';
        botao.innerText = "⚡ EM PROGRESSO";
        botao.style.color = "#ffcc00";
    } else if (botao.innerText === "⚡ EM PROGRESSO") {
        if (!confirm("Deseja enviar esta tarefa para aprovação do Admin?")) return;
        tarefas[tarefaIndex].status = 'aguardando_revisao';
        botao.innerText = "⏳ AGUARDANDO REVISÃO";
        botao.style.color = "#ff9f43";
        botao.disabled = true;
        localStorage.setItem('sala_sem_futuro_notificacao', JSON.stringify({
            tipo: 'tarefa_aguardando',
            tarefaId: tarefaId,
            tarefaTitulo: tarefas[tarefaIndex].titulo,
            operador: usuarioLogado.nome,
            timestamp: new Date().toISOString()
        }));
        botao.closest('.task-card').classList.add('review');
    }
    localStorage.setItem('sala_sem_futuro_tarefas', JSON.stringify(tarefas));
    carregarTarefasDoOperador();
}

function logout() {
    localStorage.removeItem('sala_sem_futuro_equipe_logged');
    usuarioLogado = null;
    document.getElementById('painelPrincipal').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('loginChave').value = '';
    document.getElementById('loginSenha').value = '';
}

const loggedData = localStorage.getItem('sala_sem_futuro_equipe_logged');
if (loggedData) {
    const data = JSON.parse(loggedData);
    carregarEquipe();
    usuarioLogado = equipe.find(m => m.chave === data.chave);
    if (usuarioLogado) entrarNoPainel();
}
</script>
</body>
</html>
