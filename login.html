<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050507; --gold: #d4af37; --glow: 0 0 30px rgba(212,175,55,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: #e8e8f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: radial-gradient(circle at center, rgba(212,175,55,0.08) 0%, transparent 70%);
}

.container {
  width: 100%; max-width: 420px; padding: 40px 30px;
  background: rgba(13,13,18,0.95);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 32px;
  box-shadow: var(--glow);
  text-align: center;
}

h1 {
  font-size: 2.2rem; margin-bottom: 8px; color: var(--gold);
}
.subtitle { color: #888; margin-bottom: 40px; font-size: 1rem; }

.input-group {
  margin-bottom: 20px; text-align: left;
}
label {
  display: block; font-family: 'Space Mono', monospace; font-size: 0.75rem;
  margin-bottom: 8px; color: #aaa; letter-spacing: 1px;
}
input {
  width: 100%; padding: 16px 18px; border-radius: 16px;
  background: #1a1a22; border: 1px solid rgba(212,175,55,0.25);
  color: white; font-size: 1.05rem;
}
input:focus {
  outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
}

.btn-login {
  width: 100%; padding: 18px; margin-top: 20px;
  background: linear-gradient(135deg, #f3e5ab, #d4af37);
  color: #0a0a10; font-weight: 900; font-size: 1.1rem;
  border: none; border-radius: 18px; cursor: pointer;
  transition: all 0.3s;
}
.btn-login:hover {
  transform: translateY(-4px); box-shadow: var(--glow);
}

.footer-text {
  margin-top: 40px; font-size: 0.8rem; color: #555;
}
</style>
</head>
<body>
<div class="container">
  <h1>SALA SEM FUTURO</h1>
  <p class="subtitle">NEURAL OS v2.4</p>

  <div class="input-group">
    <label>RA (Registro Acadêmico)</label>
    <input type="text" id="ra" placeholder="Ex: 2024012345" maxlength="10">
  </div>

  <button class="btn-login" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>

  <div class="footer-text">
    Sistema experimental • Uso educacional
  </div>
</div>

<script>
function fazerLogin() {
  const ra = document.getElementById('ra').value.trim();
  if (!ra || ra.length < 4) {
    alert("Digite um RA válido!");
    return;
  }
  
  localStorage.setItem('sala_sem_futuro_ra', ra);
  localStorage.setItem('sala_sem_futuro_login_time', new Date().toISOString());
  window.location.href = "dashboard.html";
}
</script>
</body>
</html>
