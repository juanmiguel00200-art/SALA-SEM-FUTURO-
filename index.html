<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala sem Futuro OS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050507; --gold: #d4af37; --glow: 0 0 40px rgba(212,175,55,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: #e8e8f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background-image: radial-gradient(circle at 50% 30%, rgba(212,175,55,0.1) 0%, transparent 70%);
}

.container {
  max-width: 520px; padding: 40px 30px;
  background: rgba(13,13,18,0.85);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 32px;
  box-shadow: var(--glow);
}

h1 {
  font-size: 3rem; margin-bottom: 10px; background: linear-gradient(90deg, #f3e5ab, #d4af37);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.tagline {
  font-size: 1.1rem; color: #aaa; margin-bottom: 50px;
}

.btn {
  display: inline-block; padding: 18px 48px; margin: 12px;
  background: linear-gradient(135deg, #d4af37, #f3e5ab);
  color: #0a0a10; font-weight: 900; font-size: 1.15rem;
  border-radius: 999px; text-decoration: none; transition: all 0.4s;
}
.btn:hover {
  transform: scale(1.05); box-shadow: var(--glow);
}
.btn-outline {
  background: transparent; border: 2px solid var(--gold); color: var(--gold);
}

.footer {
  margin-top: 80px; font-size: 0.8rem; opacity: 0.5;
}
</style>
</head>
<body>
<div class="container">
  <h1>SALA SEM FUTURO</h1>
  <p class="tagline">NEURAL OPERATING SYSTEM — v2.4</p>

  <a href="login.html" class="btn">ENTRAR COM RA</a>
  <a href="admin.html" class="btn btn-outline">ÁREA DA EQUIPE</a>

  <div class="footer">
    Sistema Educacional Experimental • 2026
  </div>
</div>
</body>
</html>
